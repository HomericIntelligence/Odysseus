# NATS Server — Primary (HomericIntelligence)
#
# Deploy on the primary host (e.g., epimetheus).
# Secondary hosts connect via leaf nodes using configs/nats/leaf.conf.
#
# TLS certificates must be provisioned before starting this server.
# Provisioning options (see ADR 008):
#   - Tailscale: tailscale cert <hostname> → rename to server-cert.pem / server-key.pem
#   - ACME/Let's Encrypt via certbot or step-ca
#   - Self-signed CA via `step ca init` (recommended for internal mesh)
# Place certs in /etc/nats/certs/ with permissions: chmod 600 key, chmod 644 cert/ca

port = 4222

# TLS for client connections — mutual TLS; maps client cert SAN-DNS to an account user (ADR-010)
tls {
  cert_file      = "/etc/nats/certs/server-cert.pem"
  key_file       = "/etc/nats/certs/server-key.pem"
  ca_file        = "/etc/nats/certs/ca.pem"
  verify_and_map = true
}

jetstream {
  store_dir = "/var/lib/nats/jetstream"
}

# Subject-scoped accounts (ADR-010). NATS maps the client cert's SAN-DNS value to user.
# Permissions mirror the hi.* subject schema (ADR-005).
# Every client cert MUST carry CN=<role>.homeric AND a DNS SAN equal to <role>.homeric.
accounts {
  SYS {
    users = [ { user = "sys.homeric" } ]            # SAN-DNS=sys.homeric — system account
  }
  HERMES {
    # Event bridge: creates JetStream streams, publishes all hi.* events (ADR-005).
    users = [ {
      user = "hermes.homeric"                        # SAN-DNS=hermes.homeric
      permissions {
        publish   { allow = ["hi.>", "$JS.API.>"] }
        subscribe { allow = ["hi.>", "_INBOX.>"] }
      }
    } ]
  }
  AGENTS {
    users = [ {
      user = "agent.homeric"                         # SAN-DNS=agent.homeric
      permissions {
        publish   { allow = ["hi.agents.>", "hi.tasks.>"] }
        subscribe { allow = ["hi.agents.>", "_INBOX.>"] }
      }
    } ]
  }
  KEYSTONE {
    # Durable consumer keystone-dag over homeric-tasks (ADR-005).
    users = [ {
      user = "keystone.homeric"                      # SAN-DNS=keystone.homeric
      permissions {
        publish   { allow = ["$JS.API.CONSUMER.>", "$JS.API.STREAM.INFO.>", "$JS.ACK.>"] }
        subscribe { allow = ["hi.tasks.>", "_INBOX.>"] }
      }
    } ]
  }
  TELEMACHY {
    users = [ {
      user = "telemachy.homeric"                     # SAN-DNS=telemachy.homeric
      permissions {
        publish   { allow = ["hi.tasks.>", "$JS.API.>"] }
        subscribe { allow = ["hi.tasks.>", "_INBOX.>"] }
      }
    } ]
  }
}

system_account = SYS

# Leaf node listener — TLS with peer verification on standard leafnode port (7422),
# authenticated. The leafnodes{} listener carries its own auth (issue #176).
leafnodes {
  port = 7422
  tls {
    cert_file = "/etc/nats/certs/server-cert.pem"
    key_file  = "/etc/nats/certs/server-key.pem"
    ca_file   = "/etc/nats/certs/ca.pem"
    verify    = true
  }
  # Leaf nodes MUST authenticate (issue #176) — this block is separate from the
  # client authorization above; a leafnode listener without it stays open.
  # Recommended: per-leaf NKey/JWT via an account. Bootstrap fallback: user/password.
  # Note: leafnodes{} authorization does not support the token field; use user/password.
  authorization {
    user     = "$NATS_LEAF_USER"
    password = "$NATS_LEAF_PASSWORD"
  }
}

# Decentralized NKey/JWT auth (recommended for production). Provision an
# operator + account JWT, then replace the token blocks above with:
# operator = "/etc/nats/certs/operator.jwt"
# resolver = MEMORY
# accounts { ... }

cluster {
  name   = "homeric-intelligence"
  listen = "0.0.0.0:6222"
  tls {
    cert_file = "/etc/nats/certs/server-cert.pem"
    key_file  = "/etc/nats/certs/server-key.pem"
    ca_file   = "/etc/nats/certs/ca.pem"
    verify    = true
  }
  # Cluster route authorization (issues #306, #318, ADR-009): TLS alone only
  # verifies the CA — any host with the mesh CA cert could otherwise join as a
  # full cluster peer (broader than a leaf relay: peers share JetStream state
  # and the full subject space). Requiring credentials prevents that.
  # Note: cluster{} authorization does NOT support the `token` field
  # (`nats-server -t` reports "Cluster authorization does not support tokens");
  # user/password is the supported bootstrap credential here. Set
  # $NATS_CLUSTER_USER and $NATS_CLUSTER_PASSWORD in deploy secrets.
  authorization {
    user     = "$NATS_CLUSTER_USER"
    password = "$NATS_CLUSTER_PASSWORD"
  }
  # Add routes for multi-server clusters:
  # routes = ["nats://nats-2:6222", "nats://nats-3:6222"]
}

# HTTP monitoring endpoint (intentionally plain HTTP — localhost only, for Prometheus scraping)
# Monitoring bound to localhost only — access via ssh tunnel or local curl
http: "127.0.0.1:8222"

