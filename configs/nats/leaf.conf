# NATS Leaf Node — Secondary Hosts
# Deploy on any host that needs to participate in the HomericIntelligence event mesh.
# Update remotes.url to the primary NATS server's Tailscale IP before deploying.

port = 4222

jetstream {
  store_dir = "/var/lib/nats/jetstream"
}

leafnodes {
  remotes = [
    {
      # Replace with the primary NATS server's Tailscale IP
      url = "nats://172.20.0.1:4222"
    }
  ]
}

# HTTP monitoring endpoint
http_port = 8222
