# NATS Leaf Node — Secondary Hosts
# Deploy on any host that needs to participate in the HomericIntelligence event mesh.
#
# Before deploying, update the remotes URL to your primary NATS server's Tailscale IP.
# The port MUST be 7422 (leafnode TLS port), NOT 4222 (client port).
#
# Example:
#   Primary host (epimetheus):  100.92.173.32
#   Control host:               100.73.61.56
#
# TLS certificates must be provisioned before starting this node (see ADR 008).
# Place certs in /etc/nats/certs/ with permissions: chmod 600 key, chmod 644 cert/ca

port = 4222

# TLS for local client connections on this leaf node
tls {
  cert_file = "/etc/nats/certs/server-cert.pem"
  key_file  = "/etc/nats/certs/server-key.pem"
  ca_file   = "/etc/nats/certs/ca.pem"
}

jetstream {
  store_dir = "/var/lib/nats/jetstream"
}

leafnodes {
  remotes = [
    {
      # Primary NATS server's Tailscale IP — TLS on leafnode port (7422)
      # Set NATS_LEAF_USER and NATS_LEAF_PASSWORD in your environment, then update
      # the IP below. To find your primary NATS server's Tailscale IP: tailscale ip -4
      # Default IP is epimetheus (100.92.173.32) — update for your network.
      # RECOMMENDED: replace user/password with per-leaf NKey/JWT credentials file:
      #   credentials = "/etc/nats/certs/leaf.creds"
      # BOOTSTRAP fallback: user/password embedded in the URL (must match hub's
      # $NATS_LEAF_USER/$NATS_LEAF_PASSWORD set in server.conf leafnodes authorization).
      # Note: the remotes stanza does not support a bare token field (issue #318).
      url = "nats+tls://$NATS_LEAF_USER:$NATS_LEAF_PASSWORD@100.92.173.32:7422"
      tls {
        ca_file = "/etc/nats/certs/ca.pem"
      }
    }
  ]
}

# HTTP monitoring endpoint (intentionally plain HTTP — localhost only, for Prometheus scraping)
# Monitoring bound to localhost only — access via ssh tunnel or local curl.
# Uncomment the monitoring_authorization block once $NATS_MONITORING_PASSWORD
# is set in your deployment secrets.
http: "127.0.0.1:8222"

