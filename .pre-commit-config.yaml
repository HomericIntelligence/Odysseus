default_install_hook_types: [pre-commit, pre-push]

# Pre-commit hooks for the Odysseus meta-repo.
#
# The forbid-silent-failures hook below is the regression guard for
# /home/mvillmow/.claude/plans/i-want-to-remove-glimmering-hellman.md — it
# rejects `|| true` and `continue-on-error: true` in source-of-truth files so
# the workarounds-removal sweep does not regress.
#
# See docs/runbooks/no-silent-failures.md for the rule, classification
# framework, and (intentionally narrow) escape hatches.

repos:
  - repo: local
    hooks:
      - id: forbid-or-true
        name: "forbid silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        description: >
          Rejects the `or-true` idiom (and its whitespace variants) in shell,
          YAML, Dockerfile, justfile, and HCL sources. Refactor to an explicit
          `if`-guard, a real conditional, or a documented `set +e`/`set -e`
          bracket. See docs/runbooks/no-silent-failures.md.
        language: pygrep
        # Matches `|| true` at a control-flow boundary: end of line, before a
        # trailing `#` comment, or before `)` `;` `&` `|`. Documentation lines
        # that quote the pattern inside backticks or other characters are not
        # matched. The leading negative-lookbehind keeps the regex from firing
        # on lines that are themselves a comment (start with optional whitespace
        # then `#`), since the runbook quotes the idiom verbatim as a teaching
        # example.
        entry: '^(?!\s*#).*\|\|\s*true(\s*$|\s*[#);&|])'
        files: \.(sh|bash|yml|yaml|hcl)$|(^|/)Dockerfile[^/]*$|(^|/)[Jj]ustfile$
        types: [text]
        pass_filenames: true

      - id: forbid-continue-on-error
        name: "forbid continue-on-error workflow opt-out"
        description: >
          GitHub Actions `continue-on-error true` (truthy form) hides real CI
          failures. Fix the underlying job/step instead. See
          docs/runbooks/no-silent-failures.md.
        language: pygrep
        entry: '^\s*continue-on-error:\s*true\s*$'
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

      - id: forbid-advisory-warnings
        name: "forbid advisory ::warning:: pattern in workflow run blocks"
        description: >
          The advisory-warning workflow annotation is morally equivalent to
          `continue-on-error: true` when it replaces a tool's failure exit
          with a benign-looking warning. The CI step still passes, the
          underlying problem still goes unfixed. Make the step fail-fast
          instead. The only legitimate use is annotating a step that runs
          BEFORE the failing tool (e.g., advising on a deprecated config),
          not wrapping the tool's own exit. See docs/runbooks/no-silent-failures.md.
        language: pygrep
        # Match the GitHub Actions advisory-annotation prefix. We exempt
        # this workflow file (the lint rule itself contains the literal
        # for self-documentation) via the `exclude` regex below.
        entry: '::warning::'
        files: ^\.github/workflows/.*\.ya?ml$
        exclude: ^\.github/workflows/_required\.yml$
        pass_filenames: true
      - id: forbid-merge-conflict-markers
        name: "forbid unresolved merge-conflict markers in tracked source"
        description: >
          Rejects `<<<<<<<`, `=======`, `>>>>>>>` markers in any staged file.
          Regression guard for the 0651c1c corruption on chore/split-hephaestus-athena
          where conflict-marker block content was committed into 4 files because
          pre-commit hooks (this one did not exist yet) had nothing to detect it.
          Scope: tracked first-party source only - skips submodule working trees
          (their own repos' hooks gate their commits) per AGENTS.md.
        language: pygrep
        entry: '^(?!\\s*#)(<<<<<<<[^<]|=======$|>>>>>>>[^<])'
        files: '\\.(sh|bash|py|md|ya?ml|json|hcl|justfile)$'
        exclude: '^(agentic/|control/|infrastructure/|provisioning/|ci-cd/|research/|shared/|testing/|\.githooks/)'
        types: [text]
        pass_filenames: true

      - id: check-grafana-credentials
        name: "Grafana default-cred rotation warning + anonymous-read marker (#179)"
        description: >
          Default Grafana creds documented in tracked *.md must carry an adjacent
          rotation warning, and anonymous Grafana access must be explicitly
          marked e2e-only within two lines above. Scoped to this repo's tracked
          files (git ls-files); submodules are never scanned. See #179.
        language: system
        entry: python3 scripts/check_grafana_credentials.py
        pass_filenames: false
        always_run: true
      - id: require-signed-commits
        name: "require gpg/ssh-signed commits on push"
        description: >
          Verify every commit being pushed is GPG/SSH signed. Runs at pre-push
          stage so it catches the full range of new commits in one pass. Use
          `git push --no-verify` to bypass intentionally. To fix: re-sign with
          `git rebase --exec 'git commit --amend --no-edit -S' <base>`.
        language: system
        entry: |
          bash -c '
            set -e
            # pre-commit pre-push hook passes refs on stdin as: <local_ref> <local_sha> <remote_ref> <remote_sha>
            # If invoked without stdin (e.g. via "pre-commit run --hook-stage pre-push" manually),
            # fall back to verifying every commit since merge-base with origin/HEAD.
            range=""
            if read -r local_ref local_sha remote_ref remote_sha; then
              if [ "$local_sha" = "0000000000000000000000000000000000000000" ]; then
                exit 0  # deleting a remote ref; nothing to verify
              fi
              if [ "$remote_sha" = "0000000000000000000000000000000000000000" ]; then
                # New branch on remote — verify everything new on this branch since merge-base with default
                default=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed "s|refs/remotes/||" || echo origin/main)
                base=$(git merge-base "$local_sha" "$default" 2>/dev/null || git rev-list --max-parents=0 "$local_sha" | tail -1)
                range="$base..$local_sha"
              else
                range="$remote_sha..$local_sha"
              fi
            else
              # Manual invocation — check unpushed commits on current branch
              if ! upstream=$(git rev-parse --abbrev-ref --symbolic-full-name "@{u}" 2>/dev/null); then
                upstream=""
              fi
              if [ -n "$upstream" ]; then
                range="$upstream..HEAD"
              else
                default=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed "s|refs/remotes/||" || echo origin/main)
                base=$(git merge-base HEAD "$default" 2>/dev/null || git rev-list --max-parents=0 HEAD | tail -1)
                range="$base..HEAD"
              fi
            fi
            commits=$(git rev-list "$range")
            if [ -z "$commits" ]; then
              exit 0
            fi
            failed=""
            for sha in $commits; do
              # %G? prints: G (good), B (bad), U (good but unknown trust), X (good but expired key),
              # Y (good signed by expired key), R (good but revoked), E (cannot check), N (no signature)
              status=$(git log -1 --format="%G?" "$sha")
              case "$status" in
                G|U) ;;
                *)   failed="$failed $sha($status)" ;;
              esac
            done
            if [ -n "$failed" ]; then
              echo "ERROR: unsigned or invalid-signature commits in push range:" >&2
              echo "$failed" | tr " " "\n" | sed "/^$/d; s/^/  /" >&2
              echo "" >&2
              echo "Fix by re-signing the range:" >&2
              echo "  git rebase --exec '"'"'git commit --amend --no-edit -S --no-verify'"'"' $(echo "$range" | cut -d. -f1)" >&2
              echo "  git push --force-with-lease" >&2
              echo "" >&2
              echo "Or, if you intentionally need to bypass (e.g. CI fixup), use:" >&2
              echo "  git push --no-verify" >&2
              exit 1
            fi
            exit 0
          '
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: version-consistency-check
        name: version-consistency-check
        entry: python3 scripts/check_version_consistency.py
        language: system
        files: ^(pixi\.toml|CHANGELOG\.md)$
        pass_filenames: false
