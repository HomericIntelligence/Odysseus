server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape container logs via the Podman/Docker API socket
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/podman/podman.sock
        refresh_interval: 10s
    relabel_configs:
      # Only scrape containers on the homeric-mesh network
      - source_labels: ['__meta_docker_container_name']
        regex: '.*odysseus.*'
        action: keep
      # Use container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(.*)'
        target_label: container
      # Extract service name from compose label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
