[workspace]
name = "odysseus"
version = "0.1.1"
description = "Meta-repo and unified architecture hub for the HomericIntelligence distributed agent mesh"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
just = ">=1.13"
conan = ">=2.0,<3"
cmake = ">=3.20,<4"
ninja = ">=1.11"
pre-commit = ">=3.0,<4"
nodejs = ">=18,<22"
shellcheck = ">=0.9,<1"

[tasks]
bootstrap = "just bootstrap"
status = "just status"
check-submodule-drift = "just check-submodule-drift"
check-doc-field-drift = "just check-doc-field-drift"
build = "just build"
test = "just test"
clean = "just clean"
lint = "just lint"
validate = "just validate-configs"
validate-nats = "just validate-nats"
validate-compose = "just validate-compose"
test-justfile-recipes = "just test-justfile-recipes"
ci = "just ci"
