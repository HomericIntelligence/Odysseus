[workspace]
name = "odysseus"
version = "0.1.0"
description = "Meta-repo and unified architecture hub for the HomericIntelligence distributed agent mesh"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
just = ">=1.13"
conan = ">=2.0,<3"
pre-commit = ">=3.0,<4"
nodejs = ">=18,<22"
shellcheck = ">=0.9,<1"

[tasks]
bootstrap = "just bootstrap"
status = "just status"
build = "just build"
test = "just test"
clean = "just clean"
lint = "just lint"
validate = "just validate-configs"
ci = "just ci"
