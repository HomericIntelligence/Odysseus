name: Install test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      ref:
        description: Branch/SHA to clone inside containers
        required: false
        default: ""

jobs:
  # Canonical `install` check for the 8-category CI naming scheme
  # (docs/ci-naming-convention.md). The full multi-OS Docker matrix below is
  # heavy (45 min × 3 images) and stays gated to schedule / workflow_dispatch.
  # This lightweight smoke job runs on every main push/PR so the Ecosystem CI
  # Status board's **install** column lights up quickly: it exercises the
  # installer's check-only detection path (no sudo, no apt, no Docker) and
  # asserts the installer is structurally sound and produces its detection
  # summary. Check-only mode exits 1 when components are missing on a bare
  # runner (expected), so we assert on the produced summary, not the exit code.
  install:
    name: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Installer script is valid bash
        run: bash -n install.sh

      - name: Reject unknown flags (CLI contract)
        run: |
          set -euo pipefail
          if bash install.sh --definitely-not-a-flag >/tmp/badflag.log 2>&1; then
            echo "::error::install.sh accepted an unknown flag (expected non-zero exit)"
            cat /tmp/badflag.log
            exit 1
          fi
          grep -q "Unknown option" /tmp/badflag.log \
            || { echo "::error::install.sh did not report 'Unknown option'"; cat /tmp/badflag.log; exit 1; }
          echo "OK: unknown flag rejected"

      - name: Check-only detection produces a summary (install smoke test)
        run: |
          set -uo pipefail
          # Check-only mode (no --install): probes components, never escalates.
          # Exit code is 1 when components are missing on a bare runner — that
          # is the expected/healthy signal, so we assert on the summary output,
          # not the exit code. NOTE: GitHub runs steps with `bash -e`, so we
          # capture the (expected non-zero) exit explicitly via `|| rc=$?`
          # rather than letting `-e` abort the step. This is exit-code capture,
          # not failure suppression — we still fail below if the summary is
          # absent.
          rc=0
          bash install.sh >/tmp/install-check.log 2>&1 || rc=$?
          echo "install.sh check-only exit code: $rc"
          cat /tmp/install-check.log
          grep -q "Detection summary:" /tmp/install-check.log \
            || { echo "::error::install.sh check-only did not produce a 'Detection summary'"; exit 1; }
          grep -q "Check-only mode" /tmp/install-check.log \
            || { echo "::error::install.sh did not run in check-only mode"; exit 1; }
          echo "OK: installer check-only smoke test passed (exit $rc tolerated)"

  install-test:
    name: Install (${{ matrix.os }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [debian12, ubuntu2404, ubuntu2204]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Determine branch ref for container clone
        id: ref
        run: |
          # workflow_dispatch override → manual ref
          if [[ -n "${{ inputs.ref }}" ]]; then
            echo "odysseus_ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "odysseus_ref=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "odysseus_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build install test image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: tests/install
          file: tests/install/Dockerfile.${{ matrix.os }}
          build-args: ODYSSEUS_REF=${{ steps.ref.outputs.odysseus_ref }}
          load: true
          tags: odysseus-install-test-${{ matrix.os }}:ci
          # Cache keyed on OS + branch so PRs get warm cache from prior runs
          cache-from: |
            type=gha,scope=install-${{ matrix.os }}-${{ steps.ref.outputs.odysseus_ref }}
            type=gha,scope=install-${{ matrix.os }}-main
          cache-to: type=gha,scope=install-${{ matrix.os }}-${{ steps.ref.outputs.odysseus_ref }},mode=max

      - name: Run 1 — install.sh --install --role worker
        id: run1
        run: |
          docker run --rm odysseus-install-test-${{ matrix.os }}:ci \
            bash install.sh --install --role worker 2>&1 \
            | tee /tmp/install-${{ matrix.os }}-run1.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Assert run 1 exit 0
        run: |
          grep -q "Install complete" /tmp/install-${{ matrix.os }}-run1.log || \
            { echo "ERROR: 'Install complete' not found in run 1 output"; exit 1; }
          echo "Run 1: OK"

      - name: Run 2 — idempotency check
        run: |
          docker run --rm odysseus-install-test-${{ matrix.os }}:ci bash -c "
            bash install.sh --install --role worker >/dev/null 2>&1
            bash install.sh --install --role worker 2>&1
            echo EXIT2:\$?
          " | tee /tmp/install-${{ matrix.os }}-run2.log
          grep -q "Install complete" /tmp/install-${{ matrix.os }}-run2.log || \
            { echo "ERROR: idempotency run did not reach 'Install complete'"; exit 1; }
          echo "Idempotency: OK"

      - name: Summary
        if: always()
        run: |
          log=/tmp/install-${{ matrix.os }}-run1.log
          {
            echo "### Install test — ${{ matrix.os }}"
            echo '```'
            if [ -f "$log" ]; then
              # `awk` always exits 0; matching zero lines is not an error.
              awk '/▶ Phase|Install complete|Passed checks|Failed checks|Warnings/' "$log" \
                | sed 's/\x1b\[[0-9;]*m//g'
            else
              echo "(no install log captured — earlier step failed before writing $log)"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload install logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: install-logs-${{ matrix.os }}
          path: /tmp/install-${{ matrix.os }}-*.log
          retention-days: 7
