name: Build Images

# Builds and publishes the mesh component container images that Odysseus's
# e2e stack builds ad-hoc from docker-compose.e2e.yml `build:` contexts, giving
# each a single pinnable, published artifact in GHCR.
#
# Registry:   ghcr.io/homericintelligence/<component> (lowercase)
# Promotion:  pull_request / merge_group / manual -> BUILD ONLY (no push)
#             push to main -> build + push :sha-<short> and :latest
#             push tag v*  -> build + push :<semver> tags
#             matrix entries with publish: false are always BUILD ONLY
#             (their canonical image is published by the component's own repo)
#
# The component build contexts live in git submodules, so checkout uses
# submodules: recursive. hello-myrmidon is intentionally OMITTED: its context
# ${MYRMIDONS_DIR}/hello-world/ references a worker missing from the Myrmidons
# submodule (tracked in #392). Add a matrix entry for it once the worker is
# restored.

on:
  pull_request:
    branches: [main]
  # merge_group intentionally removed: merge-queue checks are served by the
  # single fast `merge-queue-smoke` job in merge-queue-smoke.yml (see that file).
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/homericintelligence

permissions:
  contents: read

jobs:
  validate:
    name: build
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'merge_group' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # agamemnon: control plane / HMAS orchestration
          - component: agamemnon
            context: control/Agamemnon
            file: control/Agamemnon/Dockerfile
            publish: true
          # nestor: research / ideation / handoff to Agamemnon
          - component: nestor
            context: control/Nestor
            file: control/Nestor/Dockerfile
            publish: true
          # hermes: NATS event bridge (compose uses ${HERMES_DIR} ->
          # infrastructure/Hermes)
          - component: hermes
            context: infrastructure/Hermes
            file: infrastructure/Hermes/Dockerfile
            publish: true
          # argus-exporter: Prometheus exporter. Its Dockerfile (COPY exporter.py .)
          # needs the exporter/ dir as build context, while the Dockerfile itself
          # lives at repo root under e2e/ (compose references it as
          # dockerfile: ../../../e2e/Dockerfile.argus-exporter, relative to the
          # context). In Actions, `context` and `file` are both repo-root-relative,
          # so file: e2e/Dockerfile.argus-exporter resolves correctly.
          #
          # publish: false — BUILD-VALIDATE ONLY. The canonical
          # ghcr.io/homericintelligence/argus-exporter package is created and
          # published by Argus's own publish-exporter-image.yml, so it
          # is access-scoped to that repo: a repo-scoped GITHUB_TOKEN from
          # Odysseus gets "403 Forbidden" on blob push (this broke every main
          # push of this workflow). Pushing the same :latest from two repos
          # would also race; Argus stays the single publisher.
          - component: argus-exporter
            context: infrastructure/Argus/exporter
            file: e2e/Dockerfile.argus-exporter
            publish: false
    steps:
      - name: Checkout (with submodule contexts)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
          submodules: recursive

      - name: Verify build context exists
        run: test -f "${MATRIX_FILE}" && test -d "${MATRIX_CONTEXT}"
        env:
          MATRIX_FILE: ${{ matrix.file }}
          MATRIX_CONTEXT: ${{ matrix.context }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.component }}
          tags: type=sha,prefix=sha-

      - name: Build without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}-r2
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-r2

  publish:
    name: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write  # Push-only job publishes reviewed images to GHCR.
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: agamemnon
            context: control/Agamemnon
            file: control/Agamemnon/Dockerfile
            publish: true
          - component: nestor
            context: control/Nestor
            file: control/Nestor/Dockerfile
            publish: true
          - component: hermes
            context: infrastructure/Hermes
            file: infrastructure/Hermes/Dockerfile
            publish: true
          - component: argus-exporter
            context: infrastructure/Argus/exporter
            file: e2e/Dockerfile.argus-exporter
            publish: false
    steps:
      - name: Checkout (with submodule contexts)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
          submodules: recursive

      - name: Verify build context exists
        run: test -f "${MATRIX_FILE}" && test -d "${MATRIX_CONTEXT}"
        env:
          MATRIX_FILE: ${{ matrix.file }}
          MATRIX_CONTEXT: ${{ matrix.context }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.component }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ matrix.publish }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache scope is salted with -r2 to invalidate the pre-openssl-fix
          # layer cache. The old agamemnon scope snapshotted a `conan install`
          # layer whose generated CMakeDeps referenced a stale openssl package
          # libdir, so restoring it made `cmake` configure abort with
          # "Library 'ssl' not found" even after conanfile.py added openssl/3.6.2
          # (verified: a from-scratch build with no conan cache links cleanly).
          cache-from: type=gha,scope=${{ matrix.component }}-r2
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-r2
