name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate configs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install validation tools
        run: pip install yamllint

      - name: Lint YAML configs
        run: |
          find configs/ -name '*.yml' -o -name '*.yaml' -o -name '*.json' | sort
          find configs/ -name '*.yml' -o -name '*.yaml' | xargs --no-run-if-empty yamllint -d "{extends: default, rules: {line-length: {max: 200}, truthy: disable, document-start: disable}}"

  harden:
    name: Harden checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown docs
        run: |
          markdownlint docs/architecture.md docs/adr/*.md

      - name: Validate pixi manifest
        run: pixi info --manifest-path pixi.toml

      - name: Validate justfile
        run: pixi run just --summary

      - name: Symlink integrity audit
        run: |
          broken=$(find . -not -path './.git/*' -type l ! -exec test -e {} \; -print)
          if [ -n "$broken" ]; then
            echo "Broken symlinks found:"
            echo "$broken"
            exit 1
          fi
          echo "All symlinks are valid."

      - name: Verify Claude read permissions (if present)
        run: |
          if [ -f scripts/verify_claude_read_permissions.py ]; then
            python scripts/verify_claude_read_permissions.py
          else
            echo "scripts/verify_claude_read_permissions.py not present — skipping."
          fi
