name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate configs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install validation tools
        run: pip install yamllint

      - name: Lint YAML configs
        run: |
          find configs/ -name '*.yml' -o -name '*.yaml' -o -name '*.json' | sort
          find configs/ -name '*.yml' -o -name '*.yaml' | xargs --no-run-if-empty yamllint -d "{extends: default, rules: {line-length: {max: 200}, truthy: disable, document-start: disable}}"

  harden:
    name: Harden — docs, tooling, and symlink checks
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint documentation markdown
        run: markdownlint docs/architecture.md docs/adr/*.md

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          run-install: false

      - name: Validate pixi manifest
        run: pixi info --manifest-path pixi.toml

      - name: Validate justfile
        run: pixi run just --summary

      - name: Symlink integrity audit
        run: |
          broken=0
          while IFS= read -r -d '' link; do
            if [ ! -e "$link" ]; then
              echo "BROKEN: $link -> $(readlink "$link")"
              broken=1
            fi
          done < <(find . -type l -print0)
          [ "$broken" -eq 0 ] || exit 1

      - name: Verify Claude read permissions (skip if absent)
        run: |
          if [ -f scripts/verify_claude_read_permissions.py ]; then
            python3 scripts/verify_claude_read_permissions.py
          else
            echo "scripts/verify_claude_read_permissions.py not present — skipping"
          fi
