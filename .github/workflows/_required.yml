# Canonical required-checks workflow for the HomericIntelligence fleet.
#
# The exact filename `_required.yml` is a fleet convention: the leading
# underscore sorts it to the top of .github/workflows/ and the Actions tab,
# and every Homeric repo uses this same path so rollout tooling and the
# branch-protection runbook can reference one filename. The filename itself is
# NOT an enforcement mechanism -- renaming it would only churn doc/tooling
# references (see below), not change any required status check.
#
# What IS load-bearing: each job's `name:` value. GitHub emits the status-check
# context from the job `name:`, and the branch-protection rulesets pin those
# contexts. Keep every job `name:` byte-for-byte aligned with the contexts in
# configs/github/canonical-checks.md and the ruleset JSON
# (configs/github/org-ruleset*.json use "Required Checks / <name>";
# configs/github/repo-ruleset*.json use the bare "<name>"). Do NOT rename a job
# without updating those rulesets and re-applying them.
#
# References to this path: configs/github/canonical-checks.md,
# docs/runbooks/branch-protection-rollout.md, .pre-commit-config.yaml.
name: Required Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # merge_group intentionally removed: merge-queue checks are served by the
  # single fast `merge-queue-smoke` job in merge-queue-smoke.yml. Re-running
  # the full required matrix per queue entry serialized on runner slots
  # (70-90 min per merge). PR-side jobs in this workflow are unchanged.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: required-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML (configs/ and .github/workflows/)
        run: |
          yamllint -d relaxed configs/ .github/workflows/

      - name: Validate Nomad HCL syntax
        run: |
          find configs/nomad -name "*.hcl" | while IFS= read -r f; do
            if command -v nomad &>/dev/null; then
              nomad fmt -check "$f" && echo "OK (nomad fmt): $f"
            elif command -v hclfmt &>/dev/null; then
              hclfmt --check "$f" && echo "OK (hclfmt): $f"
            else
              echo "::notice::HCL check skipped (no validator available): $f"
            fi
          done

      - name: Validate all JSON files in configs/
        run: |
          json_files=$(find . -path './.git' -prune -o -name "*.json" -print)
          if [ -z "$json_files" ]; then
            echo "No JSON files found"
          else
            echo "$json_files" | xargs -I{} jq . {} > /dev/null
            echo "All JSON OK"
          fi

      - name: Validate tools/github shell scripts are valid bash
        run: |
          if [ -d tools/github ]; then
            sh_files=$(find tools/github -name "*.sh")
            if [ -z "$sh_files" ]; then
              echo "No shell scripts found in tools/github"
            else
              echo "$sh_files" | xargs -I{} bash -n {}
              echo "All shell scripts OK"
            fi
          else
            echo "No tools/github directory; skipping shell-script bash -n check"
          fi

      - name: Lint test scripts for corrupted / non-runnable artifacts (#374)
        run: bash scripts/lint-test-scripts.sh

  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          # Scans top-level Odysseus sources only — submodules carry their
          # own copy of this guard. Matches the forbidden idiom at end of
          # line or before a trailing comment. See
          # docs/runbooks/no-silent-failures.md.
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          # Skip the runbook (documents the rule and quotes the forbidden idiom)
          # and this workflow file itself (heredoc would otherwise self-match).
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              docs/runbooks/no-silent-failures.md) continue ;;
              .github/workflows/_required.yml) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nP '^(?!\s*#).*\|\|\s*true(\s*$|\s*[#);&|])' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per docs/runbooks/no-silent-failures.md.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            echo '::error::Found "continue-on-error: true" above. Fix the root cause per docs/runbooks/no-silent-failures.md.'
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

      - name: "Reject advisory annotation pattern"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          # The advisory-annotation pattern in workflow run blocks is morally
          # equivalent to continue-on-error: true: it lets a tool fail without
          # failing the CI step. The runbook (Bucket F) requires every tool
          # to be fail-fast. The only legitimate annotation is informational
          # text not tied to a tool's exit code — those should use
          # echo "WARN:" to stdout instead. See docs/runbooks/no-silent-failures.md.
          declare -a scan_files=()
          for f in "${files[@]}"; do
            # Exempt this workflow file (heredoc would otherwise self-match).
            case "$f" in
              .github/workflows/_required.yml) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nF '::warning::' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found advisory annotations above. Make the underlying tool fail-fast or use echo "WARN:" to stdout. See docs/runbooks/no-silent-failures.md Bucket F.'
            exit 1
          fi
          echo 'OK: no advisory annotations found'

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install markdown parser
        run: pip install markdown

      - name: Validate all markdown ADRs are well-formed
        run: |
          python3 -c "
          import markdown, glob
          files = glob.glob('docs/**/*.md', recursive=True)
          if not files:
              print('No markdown files found')
          else:
              for f in files:
                  markdown.markdown(open(f).read())
              print(f'All markdown OK ({len(files)} files parsed)')
          "

      - name: Verify e2e test coverage matrix is up to date
        run: |
          set -euo pipefail
          python3 e2e/tools/gen_test_matrix.py --validate
          python3 e2e/tools/gen_test_matrix.py --check

      - name: Run e2e test-matrix generator unit tests
        run: |
          set -euo pipefail
          # Executes the contract suite (totals, validate/check modes, print
          # mode). Previously unwired, so a stale hardcoded total (37 vs the
          # live 38) went undetected — see #375. Uses stdlib unittest (the test
          # module is unittest-based) so it needs no pip install on the runner.
          # Run from the tools dir since e2e/tools is not an importable package.
          cd e2e/tools && python3 -m unittest test_gen_test_matrix -v

      - name: Run claude-myrmidon-multi harness unit tests
        run: |
          set -euo pipefail
          # Salvaged from #369 and ported pytest -> stdlib unittest (the runner
          # has no pytest; see #375). The test loads the hyphenated harness file
          # via importlib relative to its own __file__, so cwd only affects
          # module discovery. Run from the test dir like the tools suite above.
          # DRY_RUN/NO_GITHUB keep the module import side-effect-free.
          cd e2e/tests/unit && DRY_RUN=1 NO_GITHUB=1 ISSUE_NUMBER=0 \
            python3 -m unittest test_claude_myrmidon_multi -v

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4

      - name: Validate justfile syntax
        run: just --list > /dev/null

      - name: Run release-contract regression tests
        run: bash tests/release/release.test.sh

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
          submodules: true

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4

      - name: Install PyYAML (for compose validator)
        run: pip install --user pyyaml

      - name: Validate NATS config structure
        run: python3 scripts/validate_nats_config.py

      - name: Validate docker-compose structure
        run: python3 scripts/validate_compose.py

      - name: Validate justfile recipe integrity + config validators
        run: |
          bash tests/test-justfile-recipes.sh
          bash tests/test-config-validators.sh

      - name: Check submodule URLs are reachable
        run: |
          git submodule foreach 'git ls-remote --exit-code origin HEAD > /dev/null && echo "OK: $name" || echo "WARN: $name unreachable"'

  test:
    # Aggregate test gate for the canonical 8-category CI naming scheme
    # (docs/ci-naming-convention.md). The split suites above (unit-tests,
    # integration-tests) remain as sub-checks; this job emits the canonical
    # `test` check-run so the Ecosystem CI Status board's **test** column can
    # target a single name. It is a pure gate: it fans-in the two suites and
    # fails if either failed.
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [unit-tests, integration-tests]
    if: ${{ always() }}
    steps:
      - name: Aggregate unit-tests + integration-tests results
        run: |
          set -euo pipefail
          unit="${{ needs.unit-tests.result }}"
          integ="${{ needs.integration-tests.result }}"
          echo "unit-tests:        $unit"
          echo "integration-tests: $integ"
          if [ "$unit" != "success" ] || [ "$integ" != "success" ]; then
            echo "::error::Aggregate test gate failed (unit=$unit integration=$integ)"
            exit 1
          fi
          echo "OK: all test suites passed"

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Trivy filesystem scan on configs/
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: configs/
          exit-code: 0
          format: table

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz
          echo "79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e  gitleaks_8.30.0_linux_x64.tar.gz" | sha256sum --check
          tar -xzf gitleaks_8.30.0_linux_x64.tar.gz
          chmod +x gitleaks
          # Fail-fast on findings — if gitleaks reports a leak, revoke the secret
          # and remove it from the commit history before merging. No advisory mode.
          ./gitleaks detect --source . --no-banner

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: latest

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4

      - name: Run validate-configs (canonical build artifact for meta-repo)
        run: just validate-configs

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate GitHub Actions workflow YAML against schema
        run: |
          find .github/workflows -name "*.yml" | xargs check-jsonschema \
            --schemafile https://json.schemastore.org/github-workflow

      - name: Validate ruleset JSON and review-count policy
        run: |
          # Policy (#394): merges gate on REQUIRED STATUS CHECKS, not on required
          # reviewers. The repo-scoped rulesets require 0 approvals (matching the
          # live `homeric-main-baseline` ruleset — the only ruleset enforced on
          # this repo). Org-scoped rulesets still assert >=1 (org policy is out of
          # scope here). We validate every file is well-formed JSON and carries a
          # numeric required_approving_review_count, and hold the intended count
          # per scope so drift is still caught in both directions.
          declare -A expected_min_reviews=(
            [configs/github/org-ruleset.json]=1
            [configs/github/org-ruleset-active.json]=1
            [configs/github/repo-ruleset.json]=0
            [configs/github/repo-ruleset-active.json]=0
          )
          for f in "${!expected_min_reviews[@]}"; do
            jq . "$f" > /dev/null
            count=$(jq 'first(.rules[] | select(.type=="pull_request")
                       | .parameters.required_approving_review_count)' "$f")
            want=${expected_min_reviews[$f]}
            if [ -z "$count" ] || [ "$count" != "$want" ]; then
              echo "ERROR: $f has required_approving_review_count=$count (expected $want)" >&2
              exit 1
            fi
            echo "$f OK (required_approving_review_count=$count)"
          done

      - name: Assert each ruleset config holds its intended enforcement value
        run: |
          set -euo pipefail
          # Enforcement-value contract (issue #177): the canonical bare
          # *-ruleset.json files are the live/enforcing default and must be
          # "active" so an idempotent re-apply never silently downgrades the
          # live ruleset back to shadow mode. *-active.json are also "active".
          # The explicit *-evaluate.json files carry the "evaluate" (shadow)
          # form for the deliberate rollback/shadow path (--evaluate flag).
          # Catches silent drift in BOTH directions (downgrade and upgrade).
          declare -A expected=(
            [configs/github/repo-ruleset.json]=active
            [configs/github/repo-ruleset-active.json]=active
            [configs/github/repo-ruleset-evaluate.json]=evaluate
            [configs/github/org-ruleset.json]=active
            [configs/github/org-ruleset-active.json]=active
          )
          fail=0
          for f in "${!expected[@]}"; do
            got=$(jq -r '.enforcement' "$f")
            if [ "$got" != "${expected[$f]}" ]; then
              echo "REGRESSION: $f enforcement=\"$got\" (expected \"${expected[$f]}\")" >&2
              fail=1
            else
              echo "PASSED: $f enforcement=\"$got\""
            fi
          done
          [ "$fail" -eq 0 ] || { echo "FAILED: ruleset enforcement drift detected" >&2; exit 1; }
          echo "PASSED: all ruleset configs hold their intended enforcement"

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
          submodules: true

      - name: Check for uninitialized submodules
        run: |
          # `awk` always exits 0; the count is intrinsic, no exit-code dance.
          submodule_status=$(git submodule status)
          uninit_count=$(printf '%s\n' "$submodule_status" | awk '/^-/{n++} END{print n+0}')
          if [ "$uninit_count" -gt 0 ]; then
            echo "WARN: $uninit_count uninitialized submodules detected:"
            printf '%s\n' "$submodule_status" | awk '/^-/'
          else
            echo "OK: all submodules initialized"
          fi

      - name: Verify submodule SHAs reference valid commits
        run: |
          git submodule foreach 'git log --oneline -1 HEAD'

      # Validate that pixi.lock is in sync with pixi.toml (issue #200). A
      # stale lockfile silently lets local and CI environments diverge.
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: v0.67.2
          cache: false
      - name: Validate pixi.lock is in sync with pixi.toml
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi.lock validation"
            exit 0
          fi
          if [ ! -f pixi.lock ]; then
            echo "::error::pixi.toml present but pixi.lock missing"
            exit 1
          fi
          pixi install --frozen

      - name: Validate version consistency (pixi.toml vs CHANGELOG)
        run: python3 scripts/check_version_consistency.py
