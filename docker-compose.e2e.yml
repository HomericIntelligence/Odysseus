# HomericIntelligence E2E Stack
# Starts the full pipeline in podman/docker containers.
# Usage: just e2e-up   (start)
#        just e2e-test (run hello-world validation)
#        just e2e-down (tear down)

networks:
  homeric-mesh:
    driver: bridge

services:
  # ─── Transport Layer ───────────────────────────────────
  nats:
    image: nats:latest
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks: [homeric-mesh]

  # ─── Control Plane (C++20) ───────────────────────────────
  agamemnon:
    build:
      context: control/ProjectAgamemnon/
    ports:
      - "8080:8080"
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    networks: [homeric-mesh]

  nestor:
    build:
      context: control/ProjectNestor/
    ports:
      - "8081:8081"
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    networks: [homeric-mesh]

  # ─── Infrastructure ────────────────────────────────────
  hermes:
    build:
      context: /home/mvillmow/ProjectHermes/
    ports:
      - "8085:8085"
    environment:
      NATS_URL: nats://nats:4222
      HERMES_PORT: "8085"
    depends_on:
      - nats
    networks: [homeric-mesh]

  # ─── Observability ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "19090:9090"
    volumes:
      - /home/mvillmow/Odysseus/e2e/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [homeric-mesh]

  loki:
    image: grafana/loki:latest
    ports:
      - "13100:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks: [homeric-mesh]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "13001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - /home/mvillmow/Odysseus/e2e/grafana/provisioning:/etc/grafana/provisioning:ro
      - /home/mvillmow/ProjectArgus/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus, loki]
    networks: [homeric-mesh]

  argus-exporter:
    build:
      context: /home/mvillmow/ProjectArgus/exporter/
      dockerfile: /home/mvillmow/Odysseus/e2e/Dockerfile.argus-exporter
    ports:
      - "19100:9100"
    environment:
      AGAMEMNON_URL: http://agamemnon:8080
      NESTOR_URL: http://nestor:8081
      NATS_URL: http://nats:8222
    depends_on:
      - agamemnon
      - nestor
      - nats
    networks: [homeric-mesh]

  # ─── Workers ───────────────────────────────────────────
  hello-myrmidon:
    build:
      context: /home/mvillmow/Myrmidons/hello-world/
    environment:
      NATS_URL: nats://nats:4222
      AGAMEMNON_URL: http://agamemnon:8080
    depends_on:
      - nats
      - agamemnon
    networks: [homeric-mesh]
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
