# HomericIntelligence E2E Stack
# Starts the full pipeline in podman/docker containers.
# Usage: just e2e-up   (start)
#        just e2e-test (run hello-world validation)
#        just e2e-down (tear down)

networks:
  homeric-mesh:
    driver: bridge
    driver_opts:
      dns_enabled: "true"

# Shared anchors
x-nats-env: &nats-env
  NATS_URL: nats://nats:4222

services:
  # ─── Transport Layer ───────────────────────────────────
  nats:
    image: nats:latest
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      homeric-mesh:
        aliases: [nats]

  # ─── Control Plane (C++20) ───────────────────────────────
  agamemnon:
    build:
      context: control/ProjectAgamemnon/
    ports:
      - "8080:8080"
    environment:
      <<: *nats-env
    depends_on:
      - nats
    networks:
      homeric-mesh:
        aliases: [agamemnon]

  nestor:
    build:
      context: control/ProjectNestor/
    ports:
      - "8081:8081"
    environment:
      <<: *nats-env
      NESTOR_PORT: "8081"
    depends_on:
      - nats
    networks:
      homeric-mesh:
        aliases: [nestor]

  # ─── Infrastructure ────────────────────────────────────
  hermes:
    build:
      context: /home/mvillmow/ProjectHermes/
    ports:
      - "8085:8085"
    environment:
      <<: *nats-env
      HERMES_PORT: "8085"
    depends_on:
      - nats
    networks:
      homeric-mesh:
        aliases: [hermes]

  # ─── Observability ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "19090:9090"
    volumes:
      - /home/mvillmow/Odysseus/e2e/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      homeric-mesh:
        aliases: [prometheus]

  loki:
    image: grafana/loki:latest
    ports:
      - "13100:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks:
      homeric-mesh:
        aliases: [loki]

  promtail:
    image: grafana/promtail:latest
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - /home/mvillmow/Odysseus/e2e/promtail.yml:/etc/promtail/config.yml:ro
      - promtail-positions:/tmp
      - /run/user/1000/podman/podman.sock:/var/run/podman/podman.sock:ro
    depends_on:
      - loki
    networks:
      homeric-mesh:
        aliases: [promtail]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "13001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - /home/mvillmow/Odysseus/e2e/grafana/provisioning:/etc/grafana/provisioning:ro
      - /home/mvillmow/ProjectArgus/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus, loki]
    networks:
      homeric-mesh:
        aliases: [grafana]

  argus-exporter:
    build:
      context: /home/mvillmow/ProjectArgus/exporter/
      dockerfile: /home/mvillmow/Odysseus/e2e/Dockerfile.argus-exporter
    ports:
      - "19100:9100"
    environment:
      AGAMEMNON_URL: http://agamemnon:8080
      NESTOR_URL: http://nestor:8081
      NATS_URL: http://nats:8222
    depends_on:
      - agamemnon
      - nestor
      - nats
    networks:
      homeric-mesh:
        aliases: [argus-exporter]

  # ─── Workers ───────────────────────────────────────────
  hello-myrmidon:
    build:
      context: /home/mvillmow/Myrmidons/hello-world/
    environment:
      <<: *nats-env
      AGAMEMNON_URL: http://agamemnon:8080
    depends_on:
      - nats
      - agamemnon
    networks:
      homeric-mesh:
        aliases: [hello-myrmidon]
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5

volumes:
  promtail-positions:
