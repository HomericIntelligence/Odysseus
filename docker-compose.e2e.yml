# HomericIntelligence E2E Stack
# Starts the full pipeline in podman/docker containers.
# Usage: just e2e-up   (start)
#        just e2e-test (run hello-world validation)
#        just e2e-down (tear down)

networks:
  homeric-mesh:
    driver: bridge

services:
  # ─── Transport Layer ───────────────────────────────────
  nats:
    image: nats:alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks: [homeric-mesh]
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:8222/healthz 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Control Plane ─────────────────────────────────────
  agamemnon:
    build:
      context: control/ProjectAgamemnon/
    ports:
      - "8080:8080"
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    networks: [homeric-mesh]
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/v1/health 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 128M

  nestor:
    build:
      context: control/ProjectNestor/
    ports:
      - "8081:8081"
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    networks: [homeric-mesh]
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8081/v1/health 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Infrastructure ────────────────────────────────────
  hermes:
    build:
      context: ${HERMES_DIR}/
    ports:
      - "8085:8085"
    environment:
      NATS_URL: nats://nats:4222
      HERMES_PORT: "8085"
    depends_on:
      nats:
        condition: service_healthy
    networks: [homeric-mesh]
    healthcheck:
      test: ["CMD", "sh", "-c", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/health')\" 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Observability ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--web.enable-lifecycle"]
    ports:
      - "9090:9090"
    volumes:
      - ${PROJECT_ROOT}/e2e/prometheus.runtime.yml:/etc/prometheus/prometheus.yml:ro
    networks: [homeric-mesh]
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 256M

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks: [homeric-mesh]
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
    volumes:
      - ${PROJECT_ROOT}/e2e/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${ARGUS_DIR}/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus, loki]
    networks: [homeric-mesh]
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  argus-exporter:
    build:
      context: infrastructure/ProjectArgus/exporter/
      dockerfile: ../../../e2e/Dockerfile.argus-exporter
    ports:
      - "9100:9100"
    environment:
      AGAMEMNON_URL: http://agamemnon:8080
      NESTOR_URL: http://nestor:8081
      NATS_URL: http://nats:8222
    depends_on:
      agamemnon:
        condition: service_healthy
      nestor:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [homeric-mesh]
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Workers ───────────────────────────────────────────
  hello-myrmidon:
    build:
      context: ${MYRMIDONS_DIR}/hello-world/
    environment:
      NATS_URL: nats://nats:4222
      AGAMEMNON_URL: http://agamemnon:8080
    depends_on:
      nats:
        condition: service_healthy
      agamemnon:
        condition: service_healthy
    networks: [homeric-mesh]
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 128M
